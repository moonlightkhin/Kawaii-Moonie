<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dress Up Moonie ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="app">
    <div class="header">
        <span class="sparkle">✨</span>
        <h1 class="pixel-title">Dress Up Moonie</h1>
        <span class="sparkle">✨</span>
    </div>
    
    <div class="character-container" id="capture-area">
        <div class="star s1">★</div>
        <div class="star s2">✦</div>
        <div class="star s3">★</div>
        <div class="star s4">✦</div>
        
        <div class="twinkle-flower f1">🌸</div>
        <div class="twinkle-flower f2">🌸</div>
        <div class="twinkle-flower f3">🌸</div>
        <div class="twinkle-flower f4">🌸</div>

        <button id="music-btn" onclick="toggleMusic()">🎵 OFF</button>

        <div class="character-scaler">
            <div class="character">
                <img src="base.png" class="layer">        
                <img id="shoes" src="shoes1.png" class="layer">
                <img id="dress" src="dress1.png" class="layer">
                <img id="hat" src="hat1.png" class="layer">
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="row">
            <button onclick="prevHat()">❮</button>
            <span class="label">HAT</span>
            <button onclick="nextHat()">❯</button>
        </div>
        <div class="row">
            <button onclick="prevDress()">❮</button>
            <span class="label">DRESS</span>
            <button onclick="nextDress()">❯</button>
        </div>
        <div class="row">
            <button onclick="prevShoes()">❮</button>
            <span class="label">SHOES</span>
            <button onclick="nextShoes()">❯</button>
        </div>
    </div>

    <button id="save-btn" onclick="savePhoto()">📸 Save Photo</button>
</div>

<audio id="bg-music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
