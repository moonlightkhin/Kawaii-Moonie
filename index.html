<div class="app">
    <div class="header">
        <span class="sparkle">✨</span>
        <h1 class="pixel-title">Dress Up Moonie</h1>
        <span class="sparkle">✨</span>
    </div>
    
    <div class="character-container">
        <button id="music-btn" onclick="toggleMusic()">🎵 OFF</button>

        <div class="star s1">★</div>
        <div class="star s2">✦</div>
        <div class="star s3">★</div>
        <div class="star s4">✦</div>
        
        <div class="twinkle-flower f1">🌸</div>
        <div class="twinkle-flower f2">🌸</div>
        <div class="twinkle-flower f3">🌸</div>
        <div class="twinkle-flower f4">🌸</div>

        <div class="character-scaler">
            <div class="character">
                <img src="base.png" class="layer">        
                <img id="shoes" src="shoes1.png" class="layer">
                <img id="dress" src="dress1.png" class="layer">
                <img id="hat" src="hat1.png" class="layer">
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="row"><button onclick="prevHat()">❮</button><span class="label">HAT</span><button onclick="nextHat()">❯</button></div>
        <div class="row"><button onclick="prevDress()">❮</button><span class="label">DRESS</span><button onclick="nextDress()">❯</button></div>
        <div class="row"><button onclick="prevShoes()">❮</button><span class="label">SHOES</span><button onclick="nextShoes()">❯</button></div>
    </div>
</div>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
